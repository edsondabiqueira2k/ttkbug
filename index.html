                btn.addEventListener('click', function(e) {
                    // Previne o comportamento padrão para garantir que o redirecionamento
                    // seja tratado aqui (mas o link já tem href, então é redundante, mas seguro)
                    e.preventDefault();
                    window.location.href = targetUrl;
                });
            }

            // Opcional: se após 3 segundos ainda estiver na página (por algum bloqueio),
            // exibe um aviso sutil no console (não necessário para o usuário)
            setTimeout(function() {
                // Não faz nada visível, apenas mantém a página como está.
                // O botão e o meta refresh ainda funcionarão.
            }, 3000);
        })();
    </script>
</body>
</html>
