<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0909" />
    <title>Verificando - TikBux</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0909;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #fff;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0b0909 70%);
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.08),
                        inset 0 0 12px 0 rgba(255, 255, 255, 0.02);
            padding: 32px 24px;
            text-align: center;
            transition: all 0.2s ease;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.96) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 112px;
            height: 112px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.3), 0 12px 28px rgba(79, 70, 229, 0.25);
            transition: transform 0.3s ease;
            background: #1a1a2e;
            flex-shrink: 0;
        }

        .avatar:hover {
            transform: scale(1.03);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar .fallback {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }

        .avatar img:not([src]) + .fallback,
        .avatar img[src=""] + .fallback,
        .avatar img.error + .fallback {
            display: flex;
        }

        .server-name {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f0f0ff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        .verifying-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin: 12px 0 8px;
        }

        .spinner-ring {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(79, 70, 229, 0.15);
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.15);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .verifying-text {
            font-size: 18px;
            font-weight: 500;
            color: #e0e7ff;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verifying-text .dot {
            display: inline-block;
            animation: pulse-dot 1.4s infinite;
        }
        .verifying-text .dot:nth-child(2) { animation-delay: 0.2s; }
        .verifying-text .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse-dot {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-4px); }
        }

        .timeout-message {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            animation: fadeIn 0.5s ease;
        }

        .timeout-message.visible {
            display: flex;
        }

        .timeout-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            max-width: 280px;
            line-height: 1.5;
        }

        .btn-verify {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 280px;
            padding: 14px 24px;
            background: #4f46e5;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
            letter-spacing: 0.3px;
        }

        .btn-verify:hover {
            transform: scale(1.02);
            background: #6366f1;
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .btn-verify:active {
            transform: scale(0.96);
        }

        .footer-note {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .card { padding: 24px 16px; }
            .avatar { width: 88px; height: 88px; }
            .server-name { font-size: 26px; }
            .verifying-text { font-size: 16px; }
        }
    </style>
</head>
